[package]
name = "soup-rendezvous"
version = "0.0.1"
edition = "2024"
license = "MIT"
description = "Coordination server for multi-party Bitcoin signing rendezvous."
repository = "https://github.com/8144225309/soup-rendezvous"
publish = false

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
